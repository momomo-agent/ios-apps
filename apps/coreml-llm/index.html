<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coreml Llm - OTA Install</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
.back { color: #5ac8fa; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 16px; }
.card { background: #1a1a1a; border-radius: 16px; padding: 28px; max-width: 420px; margin: 0 auto; text-align: center; }
.card h1 { font-size: 22px; margin-bottom: 6px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }
.install-btn { display: inline-block; background: #34C759; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 12px; font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.versions { text-align: left; margin-top: 16px; }
.version { padding: 10px 0; border-top: 1px solid #222; }
.version-header { display: flex; gap: 8px; align-items: center; }
.version-num { font-weight: 600; font-size: 14px; }
.version-date { color: #888; font-size: 12px; }
.version-size { color: #888; font-size: 12px; margin-left: auto; }
.version-log { color: #aaa; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
<a href="../../" class="back">← 所有应用</a>
<div class="card">
    <h1>Coreml Llm</h1>
    <p class="subtitle">com.momo.coreml-llm</p>
    <a class="install-btn" id="install-btn" href="itms-services://?action=download-manifest&url=https://ota.momomo.dev/apps/coreml-llm/manifest.plist">Install v0.4.1</a>
    <div style="margin:12px 0"><span style="color:#888;font-size:13px">分享链接: </span><code style="color:#5ac8fa;font-size:13px;background:#222;padding:4px 8px;border-radius:6px">https://ota.momomo.dev/s/285394</code></div>
    <div id="stats" style="color:#888;font-size:13px;margin-bottom:12px">已安装 <span id="cnt">...</span> 次</div>
    <img src="./qr.png" width="160" height="160" style="margin:16px auto;display:block">
    <div class="versions">
        <div style="font-size: 13px; color: #888; margin-bottom: 8px;">版本历史</div>
        
        <div class="version">
            <div class="version-header">
                <span class="version-num">v0.4.1</span>
                <span class="version-date">2026/4/10</span>
                <span class="version-size">0.7MB</span>
            </div>
            <div class="version-log">Signed build with increased-memory-limit, Gemma 4 E2B multimodal on ANE</div>
        </div>

        <div class="version">
            <div class="version-header">
                <span class="version-num">v0.4.0</span>
                <span class="version-date">2026/4/10</span>
                <span class="version-size">0.7MB</span>
            </div>
            <div class="version-log">Gemma 4 E2B multimodal on ANE, 28 tok/s, image understanding</div>
        </div>
    </div>
</div>
<script>
(function(){
  var statUrl='https://ota-stats.momomo.dev/count/coreml-llm';
  fetch(statUrl).then(function(r){return r.json()}).then(function(d){document.getElementById('cnt').textContent=d.count}).catch(function(){document.getElementById('cnt').textContent='0'});
  document.getElementById('install-btn').addEventListener('click',function(){
    if(navigator.sendBeacon){navigator.sendBeacon(statUrl,'{}')}
    else{var x=new XMLHttpRequest();x.open('POST',statUrl,false);x.send('{}')}
  });
})()
</script>
</body>
</html>
