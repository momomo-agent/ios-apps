<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iOS OTA Store</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
.header { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
.header h1 { font-size: 22px; font-weight: 700; }
.header .subtitle { color: #666; font-size: 13px; margin-top: 4px; }
.apps { max-width: 480px; margin: 0 auto; padding: 12px; }
.app-card { display: flex; align-items: center; gap: 14px; padding: 14px; border-radius: 12px; text-decoration: none; color: inherit; transition: background 0.15s; }
.app-card:hover { background: #1a1a1a; }
.app-icon, .app-icon-placeholder { width: 56px; height: 56px; border-radius: 12px; flex-shrink: 0; background: #333; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #888; }
.app-info { flex: 1; min-width: 0; }
.app-name { font-weight: 600; font-size: 16px; }
.app-meta { color: #888; font-size: 13px; margin-top: 2px; }
.app-changelog { color: #aaa; font-size: 12px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.install-arrow { color: #34C759; font-size: 20px; font-weight: 300; }
.empty { text-align: center; padding: 60px 20px; color: #444; }
</style>
</head>
<body>
<div class="header">
    <h1>📱 iOS OTA Store</h1>
    <div class="subtitle">One-click install · No App Store</div>
</div>
<div class="apps">

        <a href="./apps/gemma4-ios/" class="app-card">
            <div class="app-icon-placeholder">G</div>
            <div class="app-info">
                <div class="app-name">Gemma4 Ios</div>
                <div class="app-meta">v1.7.0 · 6.6MB</div>
                <div class="app-changelog">M1:对话 M2:多对话 M3:内存优化 M4:Tool Use M5:iCloud文件 M6:Memory系统 M7:体验打磨</div>
            </div>
            <div class="install-arrow">→</div>
        </a>
</div>
</body>
</html>
